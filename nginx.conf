server {
    listen 80;
    root /usr/share/nginx/html;

    location = / {
        try_files /landing.html =404;
    }

    location /inspect {
        try_files $uri $uri/ /inspect/index.html;
    }

    location /inspect/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
